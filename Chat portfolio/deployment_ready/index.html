<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Nitin Kr. | Chat Buddy</title>
    <meta name="description" content="Portfolio of Nitin Kr. - Design Leader, Principal Product Architect, and AI Agent builder.">
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
    <link rel="apple-touch-icon" href="assets/images/favicon.svg">
    
    <link rel="stylesheet" href="assets/css/styles.css">
    <link rel="stylesheet" href="assets/css/design-system.css">
    <link rel="stylesheet" href="assets/css/chat.css">
    <script>
        // --- High-Fidelity Theme Engine ---
        (function() {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-theme', savedTheme);
            if (savedTheme === 'light') {
                document.documentElement.classList.remove('dark-mode');
            } else {
                document.documentElement.classList.add('dark-mode');
            }
        })();
    </script>
</head>
<body class="dark-mode">
    <script>
        // Sync body class with documentElement state
        document.addEventListener('DOMContentLoaded', () => {
            const isDark = document.documentElement.classList.contains('dark-mode');
            if (isDark) {
                document.body.classList.add('dark-mode');
            } else {
                document.body.classList.remove('dark-mode');
            }
        });
    </script>
    <div class="glass-lines-bg"></div>
    <div class="light-bubbles">
        <div class="bubble b1"></div>
        <div class="bubble b2"></div>
        <div class="bubble b3"></div>
        <div class="bubble b4"></div>
        <div class="bubble b5"></div>
        <div class="bubble b6"></div>
        <div class="bubble b7"></div>
        <div class="bubble b8"></div>
    </div>
    <div class="cursor-dot"></div>
    <div class="cursor-follower"></div>

    <nav>
        <div class="ds-container" style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
            <div class="logo" style="display: flex; align-items: center;">Nitin Kr<span class="logo-dot">.</span> <span class="logo-subtitle">AI BUDDY</span></div>
            <div class="nav-right">
                <div class="nav-actions" style="display: flex; align-items: center; gap: 15px;">
                    <a href="https://design-lab-zeta.vercel.app/" target="_blank" class="nav-cta-btn">My Website</a>
                    <button class="theme-toggle ds-icon-btn" id="theme-toggle" aria-label="Toggle dark mode">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mode-icon moon-icon"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mode-icon sun-icon" style="display:none;"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <main>
        <div class="chat-container landing-state" id="chat-container">
            <div id="hero-landing" class="hero-landing">
                <div class="hero-image-wrapper">
                    <img src="assets/images/Nitin.png" alt="Nitin Kr" class="hero-img">
                </div>
                <h1 class="hero-welcome-text" style="font-family: 'Playfair Display', serif; font-weight: 800; margin-top: 20px; font-size: 2rem; text-align: center; color: var(--text-primary); line-height: 1.2; letter-spacing: -0.01em;">AI-Driven UX - Innovation Leader</h1>
            </div>
            <div class="chat-history" id="chat-history">
                <!-- Chat messages will be injected here by JS -->
            </div>
            
            <div class="chat-input-area" id="chat-input-area">
                <button id="quick-chat-toggle" class="quick-chat-toggle" aria-label="Toggle Quick Chat">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"></polyline></svg>
                </button>
                <div class="quick-replies">
                    <span class="quick-chat-label">Quick Chat</span>
                    <button class="quick-reply-btn">Intro</button>
                    <button class="quick-reply-btn">Case Studies</button>
                    <button class="quick-reply-btn">The AI Lab</button>
                    <button class="quick-reply-btn">Let's Connect</button>
                    <button class="quick-reply-btn">Professional Journey</button>
                    <div class="sticky-right-actions">
                        <span class="quick-reply-separator">|</span>
                        <a href="https://drive.google.com/file/d/1AQbzRKtwvxNG2qLzUNCPtcRXKNMW_qJY/view?usp=sharing" target="_blank" class="quick-reply-btn" style="text-decoration: none; display: flex; align-items: center; justify-content: center;">View Resume</a>
                    </div>
                </div>
                <div id="attachments-container" class="attachments-container"></div>
                <div class="input-box">
                    <input type="file" id="file-upload" accept=".pdf,.doc,.docx" style="display: none;">
                    <button id="attach-btn" class="attach-btn" aria-label="Attach File" title="Attach JD or PDF">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                    </button>

                    <input type="text" id="chat-input" placeholder="Ask me anything..." autocomplete="off">
                    
                    <button id="tts-mute-btn" class="tts-mute-btn" aria-label="Toggle Voice" title="Mute/Unmute Assistant">
                        <!-- Default Unmuted Icon (Volume Up) -->
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon-unmuted"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path><path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path></svg>
                        <!-- Muted Icon (Volume X) hidden by default -->
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon-muted" style="display: none;"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><line x1="23" y1="9" x2="17" y2="15"></line><line x1="17" y1="9" x2="23" y2="15"></line></svg>
                    </button>

                    <button id="voice-btn" class="voice-btn" aria-label="Use Voice" title="Voice Dictation">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="22"></line></svg>
                    </button>


                    <button id="send-btn" class="send-btn" aria-label="Send Message" title="Send">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                            <polyline points="12 5 19 12 12 19"></polyline>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </main>

    <!-- File Warning Modal -->
    <div id="file-warning-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content ds-card">
            <h3 class="ds-heading-h3" style="color: #ff4d4f; display: flex; align-items: center; gap: 8px;">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg>
                Unsupported File
            </h3>
            <p class="ds-body" style="margin-top: 10px;">Please upload only <strong>PDF</strong> or <strong>DOC/DOCX</strong> files. Other formats are not currently supported.</p>
            <button id="close-warning-btn" class="ds-btn ds-btn-primary" style="margin-top: 20px; width: 100%;">Got it</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="assets/js/portfolioData.js"></script>
    <script src="assets/js/chatEngine.js"></script>
    <script src="assets/js/uiInteractions.js"></script>
    <script src="assets/js/main.js"></script> <!-- Keep main.js for theme toggle, cursor etc. -->
</body>
</html>
