<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkedIn Post - High Performance Strategy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-blue: #0066FF;
            --brand-sky: #EBF3FF;
            --text-dark: #1A1A1A;
            --text-light: #FFFFFF;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: #F0F0F0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* 1080x1080 Square Protocol */
        .poster-container {
            width: 1080px;
            height: 1080px;
            background-color: var(--brand-sky);
            position: relative;
            overflow: hidden;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.1);
        }

        /* Image Pod - Top Left with rounded corner */
        .image-pod {
            position: absolute;
            top: 100px;
            left: 80px;
            width: 600px;
            height: 800px;
            background: #ccc;
            border-radius: 50px;
            overflow: hidden;
            z-index: 1;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        .hero-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Content Pod - The Diagonal Puzzle Shape */
        .content-pod {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 750px;
            height: 850px;
            background-color: var(--brand-blue);
            clip-path: polygon(40% 0%, 100% 0%, 100% 100%, 0% 100%, 0% 35%);
            z-index: 2;
            padding: 150px 100px 100px 150px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            box-shadow: -20px 0 40px rgba(0,0,0,0.1);
        }

        .headline {
            color: var(--text-light);
            font-size: 84px;
            font-weight: 900;
            line-height: 1;
            margin-bottom: 40px;
            text-transform: uppercase;
        }

        .headline span {
            color: rgba(255, 255, 255, 0.5);
        }

        .description {
            color: var(--text-light);
            font-size: 32px;
            font-weight: 400;
            line-height: 1.4;
            opacity: 0.9;
        }

        /* Branding */
        .branding {
            position: absolute;
            top: 50px;
            right: 80px;
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .brand-logo {
            width: 40px;
            height: 40px;
            background: var(--brand-blue);
            clip-path: polygon(20% 0%, 80% 0%, 100% 100%, 0% 100%);
        }

        .brand-text {
            font-size: 32px;
            font-weight: 900;
            color: var(--brand-blue);
            letter-spacing: 3px;
        }

        /* Bottom Decoration */
        .decoration-dot {
            position: absolute;
            bottom: 80px;
            left: 80px;
            width: 100px;
            height: 100px;
            background: var(--brand-blue);
            opacity: 0.1;
            border-radius: 50%;
            z-index: 1;
        }

    </style>
</head>
<body>

    <div class="poster-container">
        <!-- Branding -->
        <div class="branding">
            <div class="brand-logo"></div>
            <div class="brand-text">DESIGN STRATEGY</div>
        </div>

        <!-- Image Pod -->
        <div class="image-pod">
            <img src="/Users/ni3_kr/.gemini/antigravity/brain/95a9b5f6-2de8-4d62-b0eb-4b24242ada44/high_performance_face_swap_hero_1777392814265.png" class="hero-image" alt="UX Lead">
        </div>

        <!-- Content Pod -->
        <div class="content-pod">
            <h1 class="headline">Strategic<br><span>UX Audit</span></h1>
            <p class="description">Identifying revenue leaks through systemic friction analysis and heuristic ROI mapping.</p>
        </div>

        <!-- Decoration -->
        <div class="decoration-dot"></div>
    </div>

</body>
</html>
