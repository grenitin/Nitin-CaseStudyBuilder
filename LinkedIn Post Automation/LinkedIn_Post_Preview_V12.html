<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkedIn Post - AI Strategy Master</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-navy: #001F3F;
            --brand-blue: #007AFF;
            --bg-grid: #F2F4F7;
            --text-dark: #333333;
            --text-light: #FFFFFF;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: #E0E4E8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* 1080x1080 Square Protocol */
        .poster-container {
            width: 1080px;
            height: 1080px;
            background-color: white;
            position: relative;
            overflow: hidden;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.1);
        }

        /* Background Grid */
        .grid-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: linear-gradient(rgba(0,0,0,0.03) 1px, transparent 1px), 
                              linear-gradient(90deg, rgba(0,0,0,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 1;
        }

        /* Headline Section */
        .headline-section {
            position: absolute;
            top: 60px;
            width: 100%;
            text-align: center;
            z-index: 10;
            padding: 0 100px;
        }

        .category-tag {
            font-size: 24px;
            font-weight: 400;
            color: var(--text-dark);
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .headline {
            font-size: 64px;
            font-weight: 700;
            color: var(--text-dark);
            line-height: 1.1;
            text-transform: uppercase;
        }

        /* CTA Button */
        .cta-button {
            display: inline-flex;
            align-items: center;
            background: var(--brand-navy);
            color: white;
            padding: 20px 45px;
            border-radius: 100px;
            font-size: 24px;
            font-weight: 700;
            margin-top: 40px;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .cta-button span {
            margin-left: 20px;
            background: white;
            color: var(--brand-navy);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Hero Image Container - Centered */
        .hero-container {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 950px;
            height: 750px;
            z-index: 2;
            display: flex;
            justify-content: center;
            align-items: flex-end;
        }

        .hero-image {
            height: 110%; /* Increased scale for better proportion */
            width: auto;
            object-fit: cover;
            object-position: center 20%; /* Adjusted vertical alignment */
            mask-image: linear-gradient(to top, black 85%, transparent 100%);
            transform: translateY(20px); /* Fine-tuned vertical positioning */
        }


        /* Floating Data Cards (The Fraud Detection Aesthetic) */
        .data-card {
            position: absolute;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px 30px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
            z-index: 10;
            border: 1px solid rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .card-1 { bottom: 380px; left: 80px; }
        .card-2 { bottom: 180px; right: 80px; }

        .card-icon {
            width: 50px;
            height: 50px;
            background: var(--brand-blue);
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 24px;
        }

        .card-text b { display: block; font-size: 22px; color: var(--brand-navy); }
        .card-text p { font-size: 16px; color: #666; }

        /* AI Companion Visual */
        .ai-companion {
            position: absolute;
            bottom: 450px;
            right: 150px;
            width: 150px;
            height: 150px;
            background: radial-gradient(circle, var(--brand-blue) 0%, transparent 70%);
            border-radius: 50%;
            z-index: 3;
            animation: pulse 3s infinite ease-in-out;
            opacity: 0.6;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.4; }
            50% { transform: scale(1.3); opacity: 0.7; }
            100% { transform: scale(1); opacity: 0.4; }
        }

    </style>
</head>
<body>

    <div class="poster-container">
        <div class="grid-overlay"></div>

        <!-- Headline Section -->
        <div class="headline-section">
            <p class="category-tag">Strategic UX Intelligence</p>
            <h1 class="headline">AI-Driven UX<br>Optimization</h1>
            <div class="cta-button">
                Explore The Strategy <span>&rsaquo;</span>
            </div>
        </div>

        <!-- Hero Subject (Your Natural Standing Portrait) -->
        <div class="hero-container">
            <img src="/Users/ni3_kr/.gemini/antigravity/brain/95a9b5f6-2de8-4d62-b0eb-4b24242ada44/velonet_exact_face_swap_hero_1777392920524.png" class="hero-image" alt="UX Lead">
        </div>


        <!-- Floating Data Cards -->
        <div class="data-card card-1">
            <div class="card-icon">🧠</div>
            <div class="card-text">
                <b>Cognitive Optimization</b>
                <p>Strategic load reduction across workflows.</p>
            </div>
        </div>

        <div class="data-card card-2">
            <div class="card-icon">⚡</div>
            <div class="card-text">
                <b>Performance Audit</b>
                <p>Revenue leaks identified in milliseconds.</p>
            </div>
        </div>

        <!-- AI Component -->
        <div class="ai-companion"></div>
    </div>

</body>
</html>
