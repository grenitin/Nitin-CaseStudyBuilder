<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkedIn Post - Perfect Geometric Replica</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-purple: #7367F0;
            --brand-blue: #213363;
            --bg-page: #F5F7FA;
            --card-white: #FFFFFF;
            --text-dark: #1A1A1A;
            --text-dim: #8898AA;
            --trend-green: #2DCE89;
            --trend-red: #F5365C;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: #E2E8F0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* 1080x1080 Square Protocol */
        .poster-container {
            width: 1080px;
            height: 1080px;
            background-color: var(--bg-page);
            position: relative;
            overflow: hidden;
            box-shadow: 0 50px 100px rgba(0, 0, 0, 0.1);
        }

        /* Background Grid */
        .grid-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: linear-gradient(rgba(0,0,0,0.02) 1px, transparent 1px), 
                              linear-gradient(90deg, rgba(0,0,0,0.02) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: 1;
        }

        /* Structural Axis Lines */
        .axis { position: absolute; background: #2D3436; z-index: 2; }
        .v-top { width: 4px; height: 100px; top: 0; left: 60%; }
        .v-bottom { width: 4px; height: 100px; bottom: 0; left: 45%; }
        .h-left { width: 80px; height: 4px; left: 25%; top: 250px; }
        .h-right { width: 120px; height: 4px; right: 0; top: 250px; }
        
        .axis-dot {
            position: absolute;
            width: 16px;
            height: 16px;
            background: #2D3436;
            border-radius: 50%;
            z-index: 2;
            right: 112px; top: 244px;
        }

        /* Dotted Pattern */
        .dot-pattern {
            position: absolute;
            bottom: 120px;
            right: 60px;
            width: 380px;
            height: 150px;
            background-image: radial-gradient(var(--brand-purple) 3px, transparent 3px);
            background-size: 35px 35px;
            z-index: 2;
            opacity: 0.8;
        }

        /* Central Subject Card (Layered depth) */
        .subject-bg-card {
            position: absolute;
            top: 210px;
            left: 200px;
            width: 600px;
            height: 700px;
            background: white;
            border-radius: 40px;
            box-shadow: 0 40px 80px rgba(0,0,0,0.05);
            z-index: 2;
        }

        .hero-pod {
            position: absolute;
            top: 80px;
            left: 35%;
            width: 620px;
            height: 780px;
            border-radius: 40px;
            overflow: hidden;
            z-index: 10;
            box-shadow: 0 30px 60px rgba(0,0,0,0.1);
        }

        .hero-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: contrast(1.02);
        }

        /* Floating Data Cards */
        .data-card {
            position: absolute;
            background: white;
            padding: 35px;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.08);
            z-index: 20;
            width: 400px;
        }

        .card-impressions { top: 430px; left: 100px; }
        .card-engagement { bottom: 60px; left: 240px; }

        .card-header { font-size: 20px; font-weight: 700; color: var(--text-dim); margin-bottom: 10px; display: flex; justify-content: space-between; }
        .card-value { font-size: 64px; font-weight: 900; color: var(--brand-blue); margin-bottom: 5px; }
        .card-trend { font-size: 22px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
        .trend-up { color: var(--trend-green); }
        .trend-down { color: var(--trend-red); }

        /* Chart Placeholder (SVG Line) */
        .mini-chart {
            width: 100%;
            height: 60px;
            margin-top: 15px;
        }

        /* Action Arrow Icon */
        .arrow-circle {
            position: absolute;
            top: 30px;
            left: 260px;
            width: 130px;
            height: 130px;
            background: var(--brand-purple);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 30;
            box-shadow: 0 15px 30px rgba(115, 103, 240, 0.4);
        }

        .arrow-circle svg { width: 60px; height: 60px; fill: white; transform: rotate(-45deg); }

        /* "Visit Site" Button */
        .visit-site {
            position: absolute;
            bottom: 60px;
            left: 80px;
            display: flex;
            align-items: center;
            gap: 15px;
            color: #2D3436;
            font-size: 22px;
            font-weight: 700;
            z-index: 20;
        }

    </style>
</head>
<body>

    <div class="poster-container">
        <div class="grid-overlay"></div>

        <!-- Structural axes -->
        <div class="axis v-top"></div>
        <div class="axis v-bottom"></div>
        <div class="axis h-left"></div>
        <div class="axis h-right"></div>
        <div class="axis-dot"></div>
        
        <div class="dot-pattern"></div>
        <div class="subject-bg-card"></div>

        <!-- Action Arrow -->
        <div class="arrow-circle">
            <svg viewBox="0 0 24 24"><path d="M7 11h2v10h10v-2h-8v-8h2L11 3z"/></svg>
        </div>

        <!-- Metric Card 1: Impressions -->
        <div class="data-card card-impressions">
            <div class="card-header">Impressions <span>ⓘ</span></div>
            <div class="card-value">9,649</div>
            <div class="card-trend trend-down">▼ 24.69%</div>
            <svg class="mini-chart" viewBox="0 0 100 20">
                <path d="M0 15 L20 10 L40 12 L60 8 L80 5 L100 12" fill="none" stroke="#E74C3C" stroke-width="2"/>
            </svg>
        </div>

        <!-- Metric Card 2: Engagement -->
        <div class="data-card card-engagement">
            <div class="card-header">Engagement Rate <span>ⓘ</span></div>
            <div class="card-value">19,46%</div>
            <div class="card-trend trend-up">▲ 102.48%</div>
            <svg class="mini-chart" viewBox="0 0 100 20">
                <path d="M0 18 L20 15 L40 10 L60 12 L80 5 L100 2" fill="none" stroke="#27AE60" stroke-width="2"/>
            </svg>
        </div>

        <!-- Hero Subject with Precision Glasses Overlay -->
        <div class="hero-pod">
            <img src="/Users/ni3_kr/.gemini/antigravity/brain/95a9b5f6-2de8-4d62-b0eb-4b24242ada44/velonet_exact_face_swap_hero_1777392920524.png" class="hero-image" alt="UX Lead">
            <div class="glasses-container">
                <div class="lens"></div>
                <div class="bridge"></div>
                <div class="lens"></div>
            </div>
        </div>

        <style>
            .hero-pod { position: relative; }
            .glasses-container {
                position: absolute;
                top: 155px; /* Precisely aligned to your face in the blue t-shirt photo */
                left: 50%;
                transform: translateX(-50%);
                width: 260px;
                display: flex;
                justify-content: space-between;
                align-items: center;
                pointer-events: none;
                z-index: 100;
                opacity: 0.95;
            }
            .lens {
                width: 105px;
                height: 105px;
                border: 5px solid #000;
                border-radius: 50%;
                background: rgba(255, 255, 255, 0.05);
                box-shadow: 0 0 15px rgba(0,0,0,0.2);
            }
            .bridge {
                width: 40px;
                height: 5px;
                background: #000;
                border-radius: 2px;
            }
        </style>


        <!-- Visit Site Button -->
        <div class="visit-site">
            <span>↗</span> Visit site
        </div>
    </div>

</body>
</html>
