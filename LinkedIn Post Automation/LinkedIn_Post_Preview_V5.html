<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkedIn Post - Crimson Diamond</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-crimson: #FF3B3B;
            --brand-graphite: #1E1E1E;
            --brand-slate: #2D3436;
            --text-light: #F5F6FA;
            --text-dim: rgba(245, 246, 250, 0.6);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* 1080x1080 Square Protocol */
        .poster-container {
            width: 1080px;
            height: 1080px;
            background-color: var(--brand-graphite);
            position: relative;
            overflow: hidden;
            box-shadow: 0 50px 100px rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* The Diamond Pod */
        .diamond-pod {
            width: 800px;
            height: 800px;
            background-color: var(--brand-crimson);
            clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
            position: relative;
            overflow: hidden;
            z-index: 2;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 40px 80px rgba(0,0,0,0.4);
        }

        .hero-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center 20%;
            opacity: 0.9;
        }

        /* Text Overlays */
        .headline-section {
            position: absolute;
            top: 150px;
            left: 80px;
            z-index: 10;
        }

        .category-tag {
            color: var(--brand-crimson);
            font-size: 24px;
            font-weight: 900;
            letter-spacing: 6px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .category-tag::after {
            content: '';
            width: 100px;
            height: 3px;
            background: var(--brand-crimson);
        }

        .headline {
            font-size: 110px;
            font-weight: 900;
            color: var(--text-light);
            line-height: 0.9;
            text-transform: uppercase;
        }

        .headline span {
            color: var(--brand-crimson);
        }

        /* Description Card */
        .desc-card {
            position: absolute;
            bottom: 180px;
            right: 80px;
            width: 450px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border-left: 10px solid var(--brand-crimson);
            padding: 40px;
            z-index: 10;
        }

        .desc-text {
            color: var(--text-light);
            font-size: 28px;
            line-height: 1.3;
            font-weight: 300;
        }

        /* Bottom Branding */
        .footer {
            position: absolute;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 20;
        }

        .brand-label {
            font-size: 32px;
            font-weight: 900;
            color: var(--brand-crimson);
            letter-spacing: 4px;
        }

        /* Abstract Decorations */
        .diagonal-line {
            position: absolute;
            width: 150%;
            height: 2px;
            background: rgba(255, 59, 59, 0.1);
            transform: rotate(-45deg);
            z-index: 1;
        }

        .line-1 { top: 20%; left: -20%; }
        .line-2 { bottom: 20%; right: -20%; }

    </style>
</head>
<body>

    <div class="poster-container">
        <!-- Decoration -->
        <div class="diagonal-line line-1"></div>
        <div class="diagonal-line line-2"></div>

        <!-- Headline -->
        <div class="headline-section">
            <div class="category-tag">AI Evolution</div>
            <h1 class="headline">Intelligent<br><span>Interfaces</span></h1>
        </div>

        <!-- Diamond Pod -->
        <div class="diamond-pod">
            <img src="/Users/ni3_kr/.gemini/antigravity/brain/95a9b5f6-2de8-4d62-b0eb-4b24242ada44/ai_evolution_ui_hero_1777391402147.png" class="hero-image" alt="Intelligent UI">
        </div>

        <!-- Description -->
        <div class="desc-card">
            <p class="desc-text">Exploring the convergence of AI-driven personalization and high-performance design in 2026.</p>
        </div>


        <!-- Footer -->
        <div class="footer">
            <div class="brand-label">DESIGN STRATEGY</div>
        </div>
    </div>

</body>
</html>
