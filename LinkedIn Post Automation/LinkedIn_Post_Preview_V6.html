<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkedIn Post - Hexagonal Strategy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-teal: #003E4D;
            --brand-mint: #64FFDA;
            --brand-black: #0A192F;
            --text-light: #E6F1FF;
            --text-dim: #8892B0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: #020c1b;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* 1080x1080 Square Protocol */
        .poster-container {
            width: 1080px;
            height: 1080px;
            background-color: var(--brand-black);
            position: relative;
            overflow: hidden;
            box-shadow: 0 50px 100px rgba(0, 0, 0, 0.6);
        }

        /* Background Hex Grid Decoration */
        .hex-decoration {
            position: absolute;
            width: 300px;
            height: 300px;
            background-color: var(--brand-mint);
            clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
            opacity: 0.05;
            z-index: 1;
        }

        .hex-1 { top: -50px; right: -50px; transform: rotate(15deg); }
        .hex-2 { bottom: 100px; left: -100px; width: 400px; height: 400px; }

        /* Main Hero Hexagon */
        .hero-hex-container {
            position: absolute;
            top: 100px;
            left: 50%;
            transform: translateX(-50%);
            width: 700px;
            height: 700px;
            z-index: 2;
        }

        .hero-hex-border {
            position: absolute;
            width: 100%;
            height: 100%;
            background: var(--brand-mint);
            clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
            padding: 10px; /* Border thickness */
        }

        .hero-hex-inner {
            width: 100%;
            height: 100%;
            background: var(--brand-black);
            clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
            overflow: hidden;
        }

        .hero-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: contrast(1.1);
        }

        /* Floating Content Overlays */
        .content-card {
            position: absolute;
            z-index: 10;
            background: rgba(10, 25, 47, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(100, 255, 218, 0.2);
            padding: 40px;
            border-radius: 20px;
        }

        .headline-card {
            top: 150px;
            left: 60px;
            width: 450px;
            border-left: 8px solid var(--brand-mint);
        }

        .headline {
            font-size: 64px;
            font-weight: 900;
            color: var(--text-light);
            line-height: 1;
            text-transform: uppercase;
        }

        .headline span {
            color: var(--brand-mint);
        }

        .subtext-card {
            bottom: 120px;
            right: 60px;
            width: 500px;
            text-align: right;
            border-right: 8px solid var(--brand-mint);
        }

        .description {
            font-size: 28px;
            color: var(--text-dim);
            line-height: 1.3;
        }

        /* Branding */
        .footer-branding {
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 20px;
            z-index: 20;
        }

        .hex-logo {
            width: 40px;
            height: 40px;
            background: var(--brand-mint);
            clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
        }

        .brand-text {
            font-size: 32px;
            font-weight: 900;
            color: var(--brand-mint);
            letter-spacing: 4px;
        }

        /* Data Connector Lines */
        .connector-line {
            position: absolute;
            background: var(--brand-mint);
            opacity: 0.3;
            z-index: 1;
        }

        .line-1 { width: 2px; height: 300px; top: 0; left: 200px; transform: rotate(45deg); }
        .line-2 { width: 400px; height: 2px; bottom: 200px; right: 0; transform: rotate(-15deg); }

    </style>
</head>
<body>

    <div class="poster-container">
        <!-- Background Decorations -->
        <div class="hex-decoration hex-1"></div>
        <div class="hex-decoration hex-2"></div>
        <div class="connector-line line-1"></div>
        <div class="connector-line line-2"></div>

        <!-- Headline -->
        <div class="content-card headline-card">
            <h1 class="headline">Strategic<br><span>UX Audit</span></h1>
        </div>

        <!-- Hero Hexagon -->
        <div class="hero-hex-container">
            <div class="hero-hex-border">
                <div class="hero-hex-inner">
                    <img src="/Users/ni3_kr/.gemini/antigravity/brain/95a9b5f6-2de8-4d62-b0eb-4b24242ada44/ux_audit_face_swap_hero_1777392399118.png" class="hero-image" alt="UX Strategist">
                </div>
            </div>
        </div>

        <!-- Description -->
        <div class="content-card subtext-card">
            <p class="description">Identifying revenue leaks through systemic friction analysis and heuristic ROI mapping.</p>
        </div>


        <!-- Footer -->
        <div class="footer-branding">
            <div class="hex-logo"></div>
            <div class="brand-text">DESIGN STRATEGY</div>
        </div>
    </div>

</body>
</html>
