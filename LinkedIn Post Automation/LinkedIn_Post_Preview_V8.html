<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkedIn Post - Puzzle Blob</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-green: #1B5E4F;
            --brand-sand: #E8E8D5;
            --text-light: #FFFFFF;
            --text-dark: #1B5E4F;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: #D1D1C4;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* 1080x1080 Square Protocol */
        .poster-container {
            width: 1080px;
            height: 1080px;
            background-color: var(--brand-sand);
            position: relative;
            overflow: hidden;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.15);
        }

        /* Top-Right Image Blob */
        .image-pod {
            position: absolute;
            top: 0;
            right: 0;
            width: 800px;
            height: 800px;
            background: #ccc;
            clip-path: polygon(100% 0, 100% 100%, 50% 100%, 0% 50%, 0% 0%);
            /* Using border-radius combined with clip-path for organic feel */
            border-radius: 0 0 0 300px;
            overflow: hidden;
            z-index: 1;
        }

        .hero-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Bottom-Left Text Blob */
        .text-pod {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 650px;
            height: 650px;
            background-color: var(--brand-green);
            border-radius: 0 300px 0 0;
            z-index: 2;
            padding: 100px 80px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            box-shadow: 20px -20px 40px rgba(0,0,0,0.1);
        }

        .headline {
            color: var(--text-light);
            font-size: 82px;
            font-weight: 900;
            line-height: 1;
            margin-bottom: 30px;
        }

        .subtext {
            color: var(--text-light);
            font-size: 32px;
            font-weight: 300;
            line-height: 1.3;
            opacity: 0.9;
        }

        /* Top-Left Branding */
        .branding {
            position: absolute;
            top: 60px;
            left: 80px;
            z-index: 10;
        }

        .brand-logo {
            font-size: 32px;
            font-weight: 900;
            color: var(--brand-green);
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .brand-logo::before {
            content: '';
            width: 40px;
            height: 40px;
            background: var(--brand-green);
            border-radius: 50% 50% 0 50%;
        }

        /* Bottom-Right Decor */
        .decor-blob {
            position: absolute;
            bottom: 40px;
            right: 40px;
            width: 150px;
            height: 150px;
            background: rgba(27, 94, 79, 0.1);
            border-radius: 50%;
            z-index: 1;
        }

    </style>
</head>
<body>

    <div class="poster-container">
        <!-- Brand -->
        <div class="branding">
            <div class="brand-logo">DESIGN STRATEGY</div>
        </div>

        <!-- Image Pod -->
        <div class="image-pod">
            <img src="/Users/ni3_kr/.gemini/antigravity/brain/95a9b5f6-2de8-4d62-b0eb-4b24242ada44/user_face_swap_lifestyle_1777392103005.png" class="hero-image" alt="UX Lead">
        </div>




        <!-- Text Pod -->
        <div class="text-pod">
            <h1 class="headline">Strategic<br>Personalization.</h1>
            <p class="subtext">How AI-driven systems are reshaping the future of human-centered design.</p>
        </div>

        <!-- Decor -->
        <div class="decor-blob"></div>
    </div>

</body>
</html>
