<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkedIn Post - Angular Velocity</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-orange: #FF6E2E;
            --brand-teal: #00303D;
            --brand-cream: #FDFCF8;
            --text-dark: #001F26;
            --text-light: #FFFFFF;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: #D1D1D1;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 40px 0;
        }

        /* LinkedIn Portrait Protocol: 1080x1350 (4:5) */
        .poster-container {
            width: 1080px;
            height: 1350px;
            background-color: var(--brand-cream);
            position: relative;
            overflow: hidden;
            box-shadow: 0 60px 120px rgba(0, 0, 0, 0.2);
        }

        /* Angular Background Splits */
        .bg-split-teal {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 40%;
            background: var(--brand-teal);
            clip-path: polygon(0 0, 100% 0, 100% 60%, 0% 100%);
            z-index: 1;
        }

        .bg-split-orange {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 100%;
            height: 30%;
            background: var(--brand-orange);
            clip-path: polygon(0 100%, 100% 100%, 100% 0, 30% 100%);
            z-index: 1;
        }

        /* Triangular Pods */
        .triangle-pod {
            position: absolute;
            top: 15%;
            right: 5%;
            width: 600px;
            height: 600px;
            background: var(--brand-orange);
            clip-path: polygon(50% 0%, 100% 100%, 0% 100%);
            z-index: 2;
            overflow: hidden;
            border: 15px solid white;
        }

        .pod-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.8;
            filter: grayscale(100%) contrast(1.2);
            mix-blend-mode: overlay;
        }

        /* Human Hero */
        .hero-image {
            position: absolute;
            bottom: -50px;
            right: -50px;
            height: 1200px;
            z-index: 10;
            transform: scaleX(-1); /* Flip for dynamic balance */
            filter: drop-shadow(-20px 20px 60px rgba(0,0,0,0.3));
        }

        /* Bold Content */
        .content-overlay {
            position: absolute;
            top: 400px;
            left: 80px;
            z-index: 15;
            max-width: 600px;
        }

        .category {
            font-size: 24px;
            font-weight: 900;
            color: var(--brand-orange);
            letter-spacing: 5px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .category::after {
            content: '';
            flex: 1;
            height: 4px;
            background: var(--brand-orange);
        }

        .headline {
            font-size: 130px;
            font-weight: 900;
            line-height: 0.85;
            color: var(--brand-teal);
            margin-bottom: 40px;
        }

        .headline span {
            display: block;
            color: var(--brand-orange);
        }

        .description {
            font-size: 32px;
            font-weight: 400;
            color: var(--brand-teal);
            line-height: 1.3;
            max-width: 450px;
        }

        /* Branding */
        .footer {
            position: absolute;
            bottom: 60px;
            left: 80px;
            z-index: 20;
        }

        .branding-tag {
            font-size: 40px;
            font-weight: 900;
            color: var(--brand-teal);
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .branding-tag span {
            color: var(--brand-orange);
        }

        .dot-pattern {
            position: absolute;
            top: 50px;
            left: 50px;
            width: 200px;
            height: 200px;
            background-image: radial-gradient(var(--brand-orange) 2px, transparent 2px);
            background-size: 20px 20px;
            opacity: 0.3;
            z-index: 1;
        }

    </style>
</head>
<body>

    <div class="poster-container">
        <!-- Decoration -->
        <div class="bg-split-teal"></div>
        <div class="bg-split-orange"></div>
        <div class="dot-pattern"></div>

        <!-- Content -->
        <div class="content-overlay">
            <div class="category">DESIGN OPS</div>
            <h1 class="headline">VELOCITY <span>DRIVEN</span></h1>
            <p class="description">How strategic design operations accelerate product growth in enterprise environments.</p>
        </div>

        <!-- Triangle Pod -->
        <div class="triangle-pod">
            <img src="/Users/ni3_kr/Documents/UX/CaseStudyBuilder/static/case_study_template/hero_test_run.png" class="pod-image">
        </div>

        <!-- Human Hero -->
        <img src="/Users/ni3_kr/.gemini/antigravity/brain/95a9b5f6-2de8-4d62-b0eb-4b24242ada44/ux_lead_pinterest_style_hero_1777389406731.png" class="hero-image">

        <!-- Footer -->
        <div class="footer">
            <div class="branding-tag">DESIGN <span>STRATEGY</span></div>
        </div>
    </div>

</body>
</html>
