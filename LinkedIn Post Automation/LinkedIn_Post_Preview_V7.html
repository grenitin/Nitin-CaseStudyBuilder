<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkedIn Post - Pentagonal Strategy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-indigo: #1A1A40;
            --brand-coral: #FF7F50;
            --brand-deep: #0B0B2A;
            --text-light: #F8F9FA;
            --text-dim: rgba(248, 249, 250, 0.6);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: #050514;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* 1080x1080 Square Protocol */
        .poster-container {
            width: 1080px;
            height: 1080px;
            background-color: var(--brand-deep);
            position: relative;
            overflow: hidden;
            box-shadow: 0 50px 100px rgba(0, 0, 0, 0.7);
        }

        /* The Pentagon Pod */
        .pentagon-pod {
            position: absolute;
            top: 150px;
            left: 50%;
            transform: translateX(-50%);
            width: 850px;
            height: 850px;
            background: var(--brand-coral);
            clip-path: polygon(50% 0%, 100% 38%, 82% 100%, 18% 100%, 0% 38%);
            z-index: 2;
            overflow: hidden;
            box-shadow: 0 40px 80px rgba(0,0,0,0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .hero-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center 30%;
            opacity: 0.9;
        }

        /* Headline & Tags */
        .headline-section {
            position: absolute;
            top: 100px;
            left: 80px;
            z-index: 10;
        }

        .category-label {
            font-size: 24px;
            font-weight: 900;
            color: var(--brand-coral);
            letter-spacing: 5px;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        .headline {
            font-size: 110px;
            font-weight: 900;
            color: var(--text-light);
            line-height: 0.9;
            text-transform: uppercase;
        }

        .headline span {
            color: var(--brand-coral);
        }

        /* Feature Card */
        .feature-card {
            position: absolute;
            bottom: 150px;
            right: 80px;
            width: 450px;
            background: rgba(26, 26, 64, 0.9);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            z-index: 10;
            border-right: 12px solid var(--brand-coral);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .feature-text {
            color: var(--text-light);
            font-size: 26px;
            line-height: 1.3;
            font-weight: 400;
        }

        /* Branding */
        .footer {
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 15px;
            z-index: 20;
        }

        .pent-logo {
            width: 35px;
            height: 35px;
            background: var(--brand-coral);
            clip-path: polygon(50% 0%, 100% 38%, 82% 100%, 18% 100%, 0% 38%);
        }

        .brand-text {
            font-size: 30px;
            font-weight: 900;
            color: var(--brand-coral);
            letter-spacing: 4px;
        }

        /* Background Isometric Grid */
        .iso-grid {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: linear-gradient(rgba(255, 127, 80, 0.05) 1px, transparent 1px), 
                              linear-gradient(90deg, rgba(255, 127, 80, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: 1;
        }

    </style>
</head>
<body>

    <div class="poster-container">
        <div class="iso-grid"></div>

        <!-- Headline -->
        <div class="headline-section">
            <div class="category-label">Structural UX</div>
            <h1 class="headline">Design<br><span>Systems</span></h1>
        </div>

        <!-- Pentagon Pod -->
        <div class="pentagon-pod">
            <img src="/Users/ni3_kr/.gemini/antigravity/brain/95a9b5f6-2de8-4d62-b0eb-4b24242ada44/pentagon_strategy_hero_1777391685135.png" class="hero-image" alt="UX System Architect">
        </div>

        <!-- Feature Card -->
        <div class="feature-card">
            <p class="feature-text">Architecting the future of enterprise design through intelligent structural systems.</p>
        </div>

        <!-- Footer -->
        <div class="footer">
            <div class="pent-logo"></div>
            <div class="brand-text">DESIGN STRATEGY</div>
        </div>
    </div>

</body>
</html>
