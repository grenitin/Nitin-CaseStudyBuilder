<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkedIn Post - Velonet Strategy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-blue: #0061FF;
            --brand-sky: #FFFFFF;
            --text-dark: #1A1A1A;
            --text-light: #FFFFFF;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: #E5E5E5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* 1080x1080 Square Protocol */
        .poster-container {
            width: 1080px;
            height: 1080px;
            background-color: var(--brand-sky);
            position: relative;
            overflow: hidden;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.1);
        }

        /* Hero Image Pod - Rounded top-left to match reference */
        .image-pod {
            position: absolute;
            top: 120px;
            left: 80px;
            width: 550px;
            height: 700px;
            border-radius: 60px;
            overflow: hidden;
            z-index: 1;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        .hero-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Content Pod - The exact Velonet Diagonal Intersection */
        .content-pod {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 700px;
            height: 780px;
            background-color: var(--brand-blue);
            clip-path: polygon(0% 25%, 100% 0%, 100% 100%, 0% 100%);
            z-index: 2;
            padding: 180px 80px 100px 120px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            box-shadow: -15px 0 30px rgba(0,0,0,0.1);
        }

        .headline {
            color: var(--text-light);
            font-size: 82px;
            font-weight: 900;
            line-height: 1.1;
            margin-bottom: 40px;
        }

        .description-container {
            margin-top: 20px;
        }

        .description {
            color: var(--text-light);
            font-size: 30px;
            font-weight: 400;
            line-height: 1.4;
            opacity: 0.95;
        }

        .highlight-box {
            display: inline-block;
            background: rgba(255, 255, 255, 0.15);
            padding: 5px 15px;
            border-radius: 8px;
            margin-top: 10px;
        }

        /* Branding Elements */
        .top-branding {
            position: absolute;
            top: 60px;
            right: 80px;
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 10;
        }

        .brand-logo-circle {
            width: 35px;
            height: 35px;
            border: 5px solid var(--brand-blue);
            border-radius: 50%;
        }

        .brand-name {
            font-size: 28px;
            font-weight: 900;
            color: var(--brand-blue);
            letter-spacing: 2px;
        }

        /* Bottom Contact Details Decoration */
        .contact-info {
            position: absolute;
            bottom: 60px;
            left: 80px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .contact-item {
            display: flex;
            align-items: center;
            gap: 15px;
            color: var(--brand-blue);
            font-size: 20px;
            font-weight: 700;
        }

        .icon { font-size: 24px; }

    </style>
</head>
<body>

    <div class="poster-container">
        <!-- Top Branding -->
        <div class="top-branding">
            <div class="brand-logo-circle"></div>
            <div class="brand-name">DESIGN STRATEGY</div>
        </div>

        <!-- Hero Image -->
        <div class="image-pod">
            <img src="/Users/ni3_kr/.gemini/antigravity/brain/95a9b5f6-2de8-4d62-b0eb-4b24242ada44/velonet_exact_face_swap_hero_1777392920524.png" class="hero-image" alt="UX Lead">
        </div>

        <!-- Content Pod -->
        <div class="content-pod">
            <h1 class="headline">Strategic<br>UX Audit</h1>
            <div class="description-container">
                <p class="description">Identifying revenue leaks through systemic friction analysis and <span class="highlight-box">ROI mapping.</span></p>
            </div>
        </div>

        <!-- Contact Decoration -->
        <div class="contact-info">
            <div class="contact-item"><span class="icon">🌐</span> designstrategy.com</div>
            <div class="contact-item"><span class="icon">📞</span> +1 (555) 000-0000</div>
            <div class="contact-item"><span class="icon">📍</span> Global Strategy Hub</div>
        </div>
    </div>

</body>
</html>
